    // 创建甘特图
    const ctx = document.getElementById('ganttChart').getContext('2d');

    // 处理依赖关系
    const datasets = {};
    const tasks = [];
    const colors = {};

    ganttData.forEach((item, index) => {
        const taskName = item.task;
        tasks.push(taskName);

        if (!datasets[taskName]) {
            datasets[taskName] = {
                label: taskName,
                data: [],
                backgroundColor: item.color,
                borderColor: item.color,
                borderWidth: 2,
                borderRadius: 4,
                borderSkipped: false,
            };
        }

        datasets[taskName].data.push({
            x: [item.start, item.end],
            y: index
        });
    });

    // 创建图表
    new Chart(ctx, {
        type: 'bar',
        data: {
            datasets: Object.values(datasets)
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                title: {
                    display: true,
                    text: 'nan-picture-frontend 项目开发甘特图',
                    font: {
                        size: 18
                    }
                },
                legend: {
                    display: false
                },
                tooltip: {
                    callbacks: {
                        title: function (context) {
                            return context[0].dataset.label;
                        },
                        label: function (context) {
                            const data = context.raw;
                            const start = new Date(data.x[0]);
                            const end = new Date(data.x[1]);
                            const duration = Math.ceil((end - start) / (1000 * 60 * 60 * 24)) + 1;
                            return [
                                `开始：${start.toLocaleDateString('zh-CN')}`,
                                `结束：${end.toLocaleDateString('zh-CN')}`,
                                `持续时间：${duration}天`
                            ];
                        }
                    }
                }
            },
            scales: {
                x: {
                    type: 'time',
                    time: {
                        unit: 'day',
                        displayFormats: {

                        }
                    },
                    title: {

                    },

                },

                    title: {

                        text: '任务列表'
                    },

                        callback: function (value) {

                        }
                    }
                }
            },

                duration: 1000
            }
